<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Newsreader:opsz,wght@6-72,600;6-72,700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E52B2B",
                        "background-light": "#f5f7f8",
                        "background-dark": "#121212",
                        "neutral-dark": "#1e1e1e",
                        "border-dark": "#2a2a2a"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "serif": ["Newsreader", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .serif-header {
            font-family: 'Newsreader', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Post Create Modal Container -->
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-slate-200 dark:border-border-dark justify-between sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="serif-header text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight flex-1 text-center">Buat Laporan Lapor</h2>
<div class="flex w-10 items-center justify-end">
<button class="text-primary text-base font-bold leading-normal tracking-wide shrink-0">Post</button>
</div>
</div>
<!-- Image Upload Area (1:1 Aspect Ratio) -->
<div class="p-4">
<div class="relative group cursor-pointer w-full aspect-square bg-slate-200 dark:bg-neutral-dark rounded-xl border-2 border-dashed border-slate-300 dark:border-border-dark flex flex-col items-center justify-center overflow-hidden transition-colors hover:border-primary/50">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-4xl text-slate-400 dark:text-slate-500">add_a_photo</span>
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">Unggah Bukti Foto (1:1)</p>
</div>
<!-- Placeholder for selected image background -->
<div class="absolute inset-0 hidden bg-center bg-cover" data-alt="Official government document or building evidence photo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBKbRTP0XdJI-OIazR8LqH1AslkWGKKtIIgNC_X5Ef6PtSxqe7jkxnGZdmRx9PSiG1Vc7xjQUfSF7VBtc7ZcODz17xMdwydj6GZurGu7JvtubsDdn9kkifwMFmWyHjr_pyVaSrXninBib_RDlJnRVI1zSf0EkRe7ry4II4nsEtfoT1fYy6sfzSJ1c3n4_BZyfy9ngiAatse2hAiJWNTWNxkX-FTl34t3Y-vJ_Rk85ZsO-tdDIFL52v34dhrJL3G-TPiBg6913UrJLqJ");'></div>
</div>
</div>
<!-- Content Inputs -->
<div class="px-4 pb-6 space-y-6">
<!-- Caption Input -->
<div class="flex flex-col gap-2">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border border-primary/20">
<div class="w-full h-full bg-cover bg-center" data-alt="User profile avatar placeholder" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDLnjOEZWXgy41TuXTg3PKzHrP5xpMlzOhEXo8hqHdoP_5wX3vVzn0q5w8JAAGWfLlK3AL9yFJNqgIgu4Cu4ohraUBEndVW_UyW3MaYc2JmQMzeRXcPWYT3aJoW_oakTOMJ9T63TVbIcyRzDliHcjn4PJk-zlF_DjF_Z9Sj92fJDQoW8tZgLsnuJGKSE6GQLC4dZzjljP1mV3RqY-446OosnMoUXhSmSS3dsQRvBTwUVid4rRmLTc2s57cxNvip-dx9bdcSraaYuJNV')"></div>
</div>
<span class="font-bold text-sm tracking-tight">Akun Masyarakat</span>
</div>
<label class="block mt-2">
<textarea class="form-input block w-full bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600 text-base leading-relaxed p-0 min-h-[120px] resize-none" placeholder="Apa yang ingin Anda laporkan mengenai anggaran hari ini?"></textarea>
</label>
</div>
<div class="h-px bg-slate-200 dark:bg-border-dark"></div>
<!-- Metadata Pickers -->
<div class="space-y-4">
<!-- Location Picker -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Lokasi Temuan</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary">location_on</span>
<select class="form-input w-full pl-10 pr-4 py-3 bg-slate-100 dark:bg-neutral-dark border-none rounded-lg text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary appearance-none">
<option value="">Pilih Provinsi</option>
<option value="dki">DKI Jakarta</option>
<option value="jabar">Jawa Barat</option>
<option value="jateng">Jawa Tengah</option>
<option value="jatim">Jawa Timur</option>
<option value="sumut">Sumatera Utara</option>
</select>
</div>
</div>
<!-- Institution Tagger -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Lembaga Terkait</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary">account_balance</span>
<input class="form-input w-full pl-10 pr-4 py-3 bg-slate-100 dark:bg-neutral-dark border-none rounded-lg text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary" placeholder="Cari Instansi (e.g. Kemenkeu, Pemprov)" type="text"/>
</div>
</div>
</div>
<!-- Toolbar & Submit -->
<div class="pt-4 flex items-center justify-between border-t border-slate-200 dark:border-border-dark">
<div class="flex items-center gap-2">
<button class="p-2 text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">image</span>
</button>
<button class="p-2 text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">tag</span>
</button>
<button class="p-2 text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">sentiment_satisfied</span>
</button>
</div>
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-8 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-95">
                    Post Laporan
                </button>
</div>
</div>
<!-- Footer / Disclaimer -->
<div class="p-4 text-center mt-auto">
<p class="text-[10px] text-slate-500 dark:text-slate-600 uppercase tracking-widest leading-relaxed">
                Setiap laporan yang Anda unggah akan diverifikasi oleh komunitas Jaga Anggaran.<br/>Pastikan data yang Anda masukkan akurat dan valid.
            </p>
</div>
</div>
</body></html>

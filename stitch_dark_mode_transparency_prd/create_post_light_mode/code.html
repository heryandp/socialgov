<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Newsreader:opsz,wght@6..72,600;6..72,700&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E52B2B",
                        "background-light": "#FFFFFF",
                        "background-alt": "#FAFAFA",
                        "border-light": "#EEEEEE",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Manrope", "sans-serif"],
                        "heading": ["Newsreader", "serif"],
                        "body": ["Manrope", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .heading-font {
            font-family: 'Newsreader', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light text-slate-900 antialiased">
<div class="relative flex h-screen w-full flex-col bg-background-light overflow-hidden max-w-md mx-auto border-x border-border-light">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-background-light px-4 py-3 justify-between border-b border-border-light sticky top-0 z-10">
<button class="text-slate-900 flex size-10 shrink-0 items-center justify-start">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="heading-font text-xl font-bold leading-tight flex-1 text-center">Buat Laporan</h2>
<div class="flex w-10 items-center justify-end">
<button class="text-primary text-sm font-bold tracking-wide uppercase">Posting</button>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto bg-background-alt">
<!-- Image Upload Section -->
<div class="p-4 bg-background-light mb-2">
<div class="flex items-center justify-between mb-3">
<h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider">Bukti Anggaran</h3>
<span class="text-xs text-slate-400">Wajib (1:1)</span>
</div>
<div class="relative aspect-square w-full bg-background-alt border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center overflow-hidden group">
<div class="flex flex-col items-center gap-2 text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-4xl">add_a_photo</span>
<p class="text-sm font-medium">Unggah Foto atau Dokumen</p>
</div>
<!-- Hidden input for interaction logic -->
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
</div>
<!-- Caption Section -->
<div class="p-4 bg-background-light mb-2">
<div class="flex gap-4">
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">person</span>
</div>
<div class="flex-1">
<textarea class="w-full border-none bg-transparent focus:ring-0 p-0 text-base placeholder:text-slate-400 min-h-[120px] resize-none font-body" placeholder="Tulis rincian temuan atau kecurigaan anggaran Anda di sini..."></textarea>
</div>
</div>
</div>
<!-- Metadata Selectors -->
<div class="p-4 bg-background-light space-y-4">
<!-- Institution Search -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-500 uppercase tracking-wider">Lembaga Terkait</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">account_balance</span>
<input class="w-full pl-10 pr-4 py-3 bg-background-alt border border-border-light rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm transition-all" placeholder="Cari nama dinas atau kementerian..." type="text"/>
</div>
</div>
<!-- Region Tagging -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-500 uppercase tracking-wider">Wilayah Kejadian</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">location_on</span>
<select class="w-full pl-10 pr-4 py-3 bg-background-alt border border-border-light rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none text-sm appearance-none">
<option value="">Pilih Provinsi</option>
<option value="jabar">Jawa Barat</option>
<option value="jateng">Jawa Tengah</option>
<option value="jatim">Jawa Timur</option>
<option value="dkv">DKI Jakarta</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Privacy/Anonymous Toggle -->
<div class="flex items-center justify-between py-2 px-1">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">visibility_off</span>
<div>
<p class="text-sm font-semibold">Post Secara Anonim</p>
<p class="text-xs text-slate-400">Identitas Anda tidak akan ditampilkan</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<!-- Map Preview (Visual Anchor) -->
<div class="p-4 bg-background-light mt-2 border-t border-border-light">
<div class="rounded-xl overflow-hidden h-32 relative">
<img class="w-full h-full object-cover" data-alt="Map showing West Java region" data-location="Jawa Barat" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQDSPeh0jq9pJqq84si30ctHRGHdDjHRIJ3jZE7MsPpnI6TaYbk9ebOEmJKPhw7iOeObvab_GIITHkLSmV14oA1Y_mbtpa3u8s7t2QCrEltFrqZKTW5Iq73-ci8wjZLzstApbeY7anrFFwGaJEppWM5LcwZlBKoqtWy18O9EWHaNY0T98evd8p66eKGdsE18oZJHji8N2aM17IsHk_91Zsjzlec0FPaP4UtQWFZ1ERAP3psiD-n0VeLgBAEy51_-QyqqMvQCqQPPzO"/>
<div class="absolute inset-0 bg-black/5 flex items-center justify-center">
<div class="bg-white/90 backdrop-blur px-3 py-1.5 rounded-full flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-primary text-sm">near_me</span>
<span class="text-xs font-bold">Deteksi Lokasi Otomatis</span>
</div>
</div>
</div>
</div>
</div>
<!-- Sticky Bottom Action (Mobile) -->
<div class="p-4 bg-background-light border-t border-border-light sm:hidden">
<button class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                Kirim Laporan
            </button>
</div>
</div>
</body></html>
